name: spec-gate

# The non-bypassable backstop the dogfood ritual leans on. The git hooks (main-guard + lint shim) are
# advisory and per-clone — a fresh checkout that skipped `npm run hooks` has none — so CI is what actually
# enforces the spec↔code graph and the type contract on every push to main and every pull request.
on:
  push:
    branches: [main]
  pull_request:

jobs:
  spec-gate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0            # spex spec lint reads git history (drift / the version timeline)
      - uses: actions/setup-node@v4
        with:
          node-version-file: .nvmrc
      - name: Install spec-cli
        working-directory: spec-cli
        run: npm ci
      - name: Install dashboard
        working-directory: spec-dashboard
        run: npm ci
      - name: init-plugin parity + spec-lint (blocks on errors; coverage/drift are advisory warnings)
        run: npm run lint
      - name: dead-words gate (retired vocabulary must not resurface on command/route/label/file/node surfaces)
        run: node scripts/dead-words.mjs
      - name: typecheck
        working-directory: spec-cli
        run: npx tsc --noEmit
      - name: Pack/install smoke
        run: |
          set -euo pipefail
          tmp="$(mktemp -d)"
          trap 'rm -rf "$tmp"' EXIT
          npm pack --pack-destination "$tmp" >/dev/null
          tarball="$(find "$tmp" -maxdepth 1 -name 'spexcode-*.tgz' -print -quit)"

          mkdir "$tmp/consumer"
          cd "$tmp/consumer"
          npm init -y --silent >/dev/null
          npm install "$tarball" --silent
          npx spex --help >/dev/null

          mkdir project
          cd project
          git init --quiet
          git config user.email smoke@example.invalid
          git config user.name "Spex Smoke"
          printf 'hello\n' > README.md
          git add README.md
          git commit -m 'seed' --quiet
          ../node_modules/.bin/spex init >/dev/null
          test -f .spec/project/spec.md
          test -f spexcode.json
