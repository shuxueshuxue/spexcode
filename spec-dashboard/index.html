<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>SpexCode</title>
    <!-- tab-icon: pre-load default favicon (the SpexCode mark — a tidy-tree glyph, root bezier-linked
         to two children, on a violet-to-fuchsia gradient tile — the dashboard's own tree-rendering language);
         a configured dashboard.icon replaces it at runtime once the board loads. Inline SVG — no asset to ship. -->
    <link rel="icon" href="data:image/svg+xml,%3Csvg%20xmlns='http://www.w3.org/2000/svg'%20viewBox='0%200%2064%2064'%3E%3Cdefs%3E%3ClinearGradient%20id='g'%20x1='0'%20y1='0'%20x2='1'%20y2='1'%3E%3Cstop%20offset='0'%20stop-color='%237c3aed'/%3E%3Cstop%20offset='1'%20stop-color='%23c026d3'/%3E%3C/linearGradient%3E%3C/defs%3E%3Crect%20x='2'%20y='2'%20width='60'%20height='60'%20rx='14'%20fill='url(%23g)'/%3E%3Cg%20stroke='%23fff'%20stroke-width='4'%20fill='none'%20stroke-linecap='round'%3E%3Cpath%20d='M32%2025%20C32%2034%2018.5%2033%2018.5%2041'/%3E%3Cpath%20d='M32%2025%20C32%2034%2045.5%2033%2045.5%2041'/%3E%3C/g%3E%3Cg%20fill='%23fff'%3E%3Ccircle%20cx='32'%20cy='20'%20r='6.5'/%3E%3Ccircle%20cx='18.5'%20cy='45'%20r='5.2'/%3E%3Ccircle%20cx='45.5'%20cy='45'%20r='5.2'/%3E%3C/g%3E%3C/svg%3E" />
    <!-- theme: apply the saved theme choice to <html data-theme> BEFORE first paint, so there's no
         wrong-palette flash before the module boots. Anything unsaved, invalid, or legacy (the retired
         light/dark codes) resolves to the Minimal default. Mirrors theme.js's getTheme() — keep this
         code list in sync with THEMES there. -->
    <script>
      (function () {
        try {
          var t = localStorage.getItem('spexcode.theme')
          if (['minimal', 'things', 'tokyonight', 'catppuccin', 'everforest', 'gruvbox', 'rosepine', 'dracula'].indexOf(t) < 0) t = 'minimal'
          document.documentElement.setAttribute('data-theme', t)
        } catch (e) { /* localStorage unavailable — the bare :root default (Minimal) stands */ }
      })()
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
