<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>SpexCode</title>
    <!-- tab-icon: pre-load default favicon (the SpexCode mark — a terminal-style pixel-block letter S,
         colored in ANSI-style per-row violet→fuchsia steps, on a dark terminal tile with a light rim —
         the block-lettering language of code-CLI splash screens);
         a configured dashboard.icon replaces it at runtime once the board loads. Inline SVG — no asset to ship. -->
    <link rel="icon" href="data:image/svg+xml,%3Csvg%20xmlns='http://www.w3.org/2000/svg'%20viewBox='0%200%2064%2064'%3E%3Crect%20x='2'%20y='2'%20width='60'%20height='60'%20rx='14'%20fill='%2317151f'/%3E%3Crect%20x='2.75'%20y='2.75'%20width='58.5'%20height='58.5'%20rx='13.25'%20fill='none'%20stroke='%23fff'%20stroke-opacity='.22'%20stroke-width='1.5'/%3E%3Crect%20x='17'%20y='12'%20width='30'%20height='8'%20fill='%238b5cf6'/%3E%3Crect%20x='17'%20y='20'%20width='8'%20height='8'%20fill='%23a855f7'/%3E%3Crect%20x='17'%20y='28'%20width='30'%20height='8'%20fill='%23c026d3'/%3E%3Crect%20x='39'%20y='36'%20width='8'%20height='8'%20fill='%23d946ef'/%3E%3Crect%20x='17'%20y='44'%20width='30'%20height='8'%20fill='%23e879f9'/%3E%3C/svg%3E" />
    <!-- theme: apply the saved theme choice to <html data-theme> BEFORE first paint, so there's no
         wrong-palette flash before the module boots. Anything unsaved, invalid, or legacy (the retired
         light/dark codes) resolves to the Minimal default. Mirrors theme.js's getTheme() — keep this
         code list in sync with THEMES there. -->
    <script>
      (function () {
        try {
          var t = localStorage.getItem('spexcode.theme')
          if (['minimal', 'things', 'tokyonight', 'catppuccin', 'everforest', 'gruvbox', 'rosepine', 'dracula'].indexOf(t) < 0) t = 'minimal'
          document.documentElement.setAttribute('data-theme', t)
        } catch (e) { /* localStorage unavailable — the bare :root default (Minimal) stands */ }
      })()
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
